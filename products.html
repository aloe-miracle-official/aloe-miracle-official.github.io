<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتجاتنا | Aloe Miracle</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif}
    body {background:#F8F9FA; color:#1a1a1a}
    .container {max-width:1200px; margin:auto; padding:0 20px}
    nav {background:#0F5132; padding:10px 0; position:sticky; top:0}
    nav .container {display:flex; justify-content:space-between; align-items:center}
    .logo {display:flex; align-items:center; gap:15px}
    .logo img {height:50px}
    .logo span {color:#D4AF37; font-size:1.8rem; font-weight:900}
    .nav-links a {color:white; text-decoration:none; margin:0 15px; font-weight:700}
    .section {padding:80px 0}
    .section-title {text-align:center; font-size:2.5rem; font-weight:900; margin-bottom:50px; color:#0F5132}
    .products-grid {display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:30px}
    .product-card {background:white; border-radius:15px; overflow:hidden; box-shadow:0 5px 20px rgba(0,0,0,0.1); text-align:center}
    .product-card img {width:100%; height:300px; object-fit:cover}
    .product-info {padding:25px}
    .product-info h3 {font-size:1.5rem; margin-bottom:10px}
    .product-info p {color:#666; margin-bottom:15px; min-height:50px}
    .price {font-size:2rem; font-weight:900; color:#0F5132; margin-bottom:20px}
    .btn {background:#D4AF37; color:#1a1a1a; padding:15px 30px; border-radius:50px; text-decoration:none; font-weight:700; display:inline-block}
    footer {background:#1a1a1a; color:#aaa; text-align:center; padding:30px 20px; margin-top:60px}
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <div class="logo">
        <img src="logo.png" alt="Aloe Miracle Logo">
        <span>Aloe Miracle</span>
      </div>
      <div class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="products.html">منتجاتنا</a>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <h2 class="section-title">مجموعة منتجات Aloe Miracle</h2>
      <div class="products-grid">

        <div class="product-card">
          <img src="https://images.unsplash.com/photo-1620916566398-39f1143ab7be?q=80&w=1887" alt="سيروم Aloe Miracle">
          <div class="product-info">
            <h3>سيروم Aloe Miracle الأصلي</h3>
            <p>لوقف التساقط وتكثيف الشعر. غني بالألوفيرا وزيت الأركان.</p>
            <div class="price">199 درهم</div>
            <a href="https://wa.me/212621536578?text=بغيت نكوموندي سيروم Aloe Miracle" class="btn">طلب عبر واتساب</a>
          </div>
        </div>

      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Aloe Miracle. جميع الحقوق محفوظة.</p>
  </footer>

</body>
  </html>
