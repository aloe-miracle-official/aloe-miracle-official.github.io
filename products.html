<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aloe Miracle</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.container{
max-width:500px;
margin:60px auto;
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{color:#0F5132}

input, select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:15px;
background:#25D366;
color:white;
border:none;
border-radius:10px;
font-size:1.1rem;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🛒 طلب Aloe Miracle</h1>

<form id="orderForm">

<input type="text" id="name" placeholder="الاسم الكامل" required>
<input type="tel" id="phone" placeholder="رقم الهاتف" required>
<input type="text" id="city" placeholder="المدينة" required>

<select id="product">
<option>سيروم Aloe - 149 DH</option>
<option>باك 2 - 249 DH</option>
<option>باك العلاج الكامل - 399 DH</option>
</select>

<button type="submit">تأكيد الطلب عبر واتساب</button>

</form>

</div>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e){
e.preventDefault();

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let city = document.getElementById("city").value;
let product = document.getElementById("product").value;

let msg = "🛒 طلب جديد Aloe Miracle%0A%0A"
+ "📦 المنتج: " + product + "%0A"
+ "👤 الاسم: " + name + "%0A"
+ "📞 الهاتف: " + phone + "%0A"
+ "📍 المدينة: " + city + "%0A%0A"
+ "🚚 الدفع عند الاستلام";

window.open("https://wa.me/212621536578?text=" + msg, "_blank");
});
</script>

</body>
</html>
